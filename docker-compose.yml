version: '3.8'

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: invoiceflow-db
    environment:
      POSTGRES_DB: invoiceflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: IITDREAM5678
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend API (Node.js + Express) ────────────────────────────────────────
  backend:
    build: ./backend
    container_name: invoiceflow-backend
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: invoiceflow
      DB_USER: postgres
      DB_PASSWORD: IITDREAM5678
      JWT_SECRET: invoiceflow_jwt_secret_2024
      JWT_EXPIRE: 7d
      AI_SERVICE_URL: http://ai-service:8000
      NODE_ENV: production
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── AI Service (Python + FastAPI) ──────────────────────────────────────────
  ai-service:
    build: ./ai-service
    container_name: invoiceflow-ai
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ─── Frontend (React + Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./invoiceflow-react
      args:
        VITE_API_URL: http://localhost:5000
    container_name: invoiceflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
  backend_logs:
