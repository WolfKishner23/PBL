services:
  # ─── Node.js Backend API ───────────────────────────────────────
  # Root Directory: backend
  - type: web
    name: invoiceflow-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set manually in Render dashboard from Neon
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        value: invoiceflow-admin-secret-2024 # Match with Frontend
      - key: AI_SERVICE_URL
        fromService:
          name: invoiceflow-ai
          type: web
          property: hostport
      - key: FRONTEND_URL
        value: https://invoiceflow-frontend.onrender.com

  # ─── Python AI Service (OCR Enabled) ───────────────────────────
  # Root Directory: ai-service
  - type: web
    name: invoiceflow-ai
    runtime: docker
    plan: free
    rootDir: ai-service
    envVars:
      - key: PORT
        value: 8000

  # ─── React Frontend ────────────────────────────────────────────
  # Root Directory: invoiceflow-react
  - type: static_site
    name: invoiceflow-frontend
    rootDir: invoiceflow-react
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://invoiceflow-api.onrender.com
      - key: VITE_AI_URL
        value: https://invoiceflow-ai.onrender.com
      - key: VITE_ADMIN_SECRET
        value: invoiceflow-admin-secret-2024 # Match with Backend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
