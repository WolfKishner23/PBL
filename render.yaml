databases:
  - name: invoiceflow-db
    plan: free
    databaseName: invoiceflow
    user: invoiceflow_user

services:
  # ─── Node.js Backend API ───────────────────────────────────────
  - type: web
    name: invoiceflow-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        fromDatabase:
          name: invoiceflow-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: invoiceflow-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: invoiceflow-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: invoiceflow-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: invoiceflow-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        fromService:
          name: invoiceflow-ai
          type: web
          property: hostport
      - key: FRONTEND_URL
        value: https://invoiceflow-frontend.onrender.com

  # ─── Python AI Service ─────────────────────────────────────────
  - type: web
    name: invoiceflow-ai
    runtime: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000

  # ─── React Frontend ────────────────────────────────────────────
  - type: web
    name: invoiceflow-frontend
    runtime: static
    rootDir: invoiceflow-react
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://invoiceflow-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
